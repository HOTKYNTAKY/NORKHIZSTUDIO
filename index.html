<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2BOX | خرید ترافیک اختصاصی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .plan-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">پنل فروش اختصاصی V2BOX</h1>
            <p class="text-gray-400">سریع، امن و بدون قطعی</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="space-y-4">
                <h2 class="text-xl font-bold mb-4"><i class="fas fa-box-open ml-2 text-blue-400"></i>انتخاب بسته:</h2>
                
                <div class="plan-card glass p-4 rounded-2xl cursor-pointer transition active" onclick="selectPlan(this, '1 گیگابایت', '430')">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">1 گیگابایت</span>
                        <span class="text-blue-400">430 تومان</span>
                    </div>
                </div>

                <div class="plan-card glass p-4 rounded-2xl cursor-pointer transition" onclick="selectPlan(this, '2 گیگابایت', '850')">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">2 گیگابایت</span>
                        <span class="text-blue-400">850 تومان</span>
                    </div>
                </div>

                <div class="plan-card glass p-4 rounded-2xl cursor-pointer transition" onclick="selectPlan(this, '3 گیگابایت', '1200')">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">3 گیگابایت</span>
                        <span class="text-blue-400">1,200 تومان</span>
                    </div>
                </div>

                <div class="plan-card glass p-4 rounded-2xl cursor-pointer transition" onclick="selectPlan(this, '4 گیگابایت', '1600')">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">4 گیگابایت</span>
                        <span class="text-blue-400">1,600 تومان</span>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl h-fit">
                <h2 class="text-xl font-bold mb-6 text-center">تکمیل اطلاعات ارسال</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">نام و نام خانوادگی (اجباری)</label>
                        <input type="text" id="userName" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition" placeholder="مثلاً: علی احمدی">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">آیدی تلگرام (اجباری)</label>
                        <input type="text" id="userTelegram" dir="ltr" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition text-left" placeholder="@username">
                    </div>

                    <div class="pt-4">
                        <div class="bg-blue-600/10 p-4 rounded-xl mb-6">
                            <p class="text-sm">بسته انتخابی: <span id="selectedDisplay" class="font-bold text-blue-400">1 گیگابایت</span></p>
                            <p class="text-sm">مبلغ قابل پرداخت: <span id="priceDisplay" class="font-bold text-blue-400">430 تومان</span></p>
                        </div>
                        
                        <button onclick="sendOrder()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-500/20">
                            ثبت سفارش و پرداخت
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-12 text-center">
            <a href="https://t.me/V2BOX_SUPPORT_EP" class="text-gray-400 hover:text-white transition">
                <i class="fab fa-telegram ml-1"></i> پشتیبانی: @V2BOX_SUPPORT_EP
            </a>
        </footer>
    </div>

    <script>
        let selectedVolume = "1 گیگابایت";
        let selectedPrice = "430";

        function selectPlan(element, volume, price) {
            // حذف کلاس فعال از بقیه
            document.querySelectorAll('.plan-card').forEach(card => card.classList.remove('active'));
            // اضافه کردن به انتخاب شده
            element.classList.add('active');
            
            selectedVolume = volume;
            selectedPrice = price;
            
            document.getElementById('selectedDisplay').innerText = volume;
            document.getElementById('priceDisplay').innerText = price + " تومان";
        }

        async function sendOrder() {
            const name = document.getElementById('userName').value;
            const telegram = document.getElementById('userTelegram').value;
            const btn = document.getElementById('submitBtn');

            if (!name || !telegram) {
                alert("لطفاً تمام موارد اجباری را پر کنید!");
                return;
            }

            btn.innerText = "در حال ارسال...";
            btn.disabled = true;

            const token = "8582158113:AAFIg-PPeQ7PhmB-Ygd0MuQl3XND9mE7pXw";
            const chatId = "7403377873";
            const message = `
🚀 **سفارش جدید فیلترشکن**
────────────────
👤 نام مشتری: ${name}
🆔 آیدی تلگرام: ${telegram}
📦 بسته: ${selectedVolume}
💰 مبلغ: ${selectedPrice} تومان
────────────────
            `;

            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            try {
                const response = await fetch(url);
                if (response.ok) {
                    alert("سفارش شما با موفقیت ثبت شد. بزودی با شما تماس می‌گیریم.");
                    document.getElementById('userName').value = "";
                    document.getElementById('userTelegram').value = "";
                } else {
                    alert("خطا در ارسال! دوباره تلاش کنید.");
                }
            } catch (error) {
                alert("خطای شبکه! اتصال خود را چک کنید.");
            } finally {
                btn.innerText = "ثبت سفارش و پرداخت";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
