<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبکه عصبی کوانتومی نکتو | NEXTO 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --neon-accent: #667eea;
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Vazirmatn', sans-serif; /* اعمال فونت فارسی */
        }

        body {
            overflow: hidden;
            background: #050508;
            color: var(--text-main);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* استایل پنل‌های شیشه‌ای */
        .glass-panel {
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-right: 1px solid var(--glass-highlight);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: absolute;
            z-index: 10;
            overflow: hidden;
        }

        .glass-panel:hover {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            transform: translateY(-2px);
        }

        #instructions-container {
            top: 32px;
            right: 32px; /* تغییر موقعیت به راست برای فارسی */
            width: 280px;
            padding: 24px;
        }

        #instruction-title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .instruction-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 300;
        }

        #theme-selector {
            top: 32px;
            left: 32px; /* تم سلکتور به چپ منتقل شد */
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 220px;
        }

        #theme-selector-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .theme-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        #theme-1 { background: radial-gradient(circle at 30% 30%, #a78bfa, #4c1d95); }
        #theme-2 { background: radial-gradient(circle at 30% 30%, #fb7185, #9f1239); }
        #theme-3 { background: radial-gradient(circle at 30% 30%, #38bdf8, #0c4a6e); }

        .theme-button.active::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        #density-controls {
            margin-top: 8px;
        }

        .density-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .density-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            outline: none;
        }

        .density-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #control-buttons {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 20;
        }

        .control-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: var(--neon-accent);
        }

        @media (max-width: 640px) {
            #instructions-container, #theme-selector {
                right: 16px; left: 16px; width: auto;
            }
            #instructions-container { top: 16px; }
            #theme-selector { top: auto; bottom: 100px; flex-direction: row; }
        }
    </style>
</head>

<body>

    <div id="instructions-container" class="glass-panel">
        <div id="instruction-title">شبکه عصبی کوانتومی</div>
        <div class="instruction-text">
            برای ارسال پالس انرژی کلیک کنید. <br>
            برای کاوش در ساختار، تصویر را بکشید.
        </div>
    </div>

    <div id="theme-selector" class="glass-panel">
        <div style="flex: 1;">
            <div id="theme-selector-title">پالت رنگی</div>
            <div class="theme-grid">
                <button class="theme-button active" id="theme-1" data-theme="0" title="سحابی بنفش"></button>
                <button class="theme-button" id="theme-2" data-theme="1" title="آتش غروب"></button>
                <button class="theme-button" id="theme-3" data-theme="2" title="شفق اقیانوسی"></button>
            </div>
        </div>
        <div id="density-controls" style="flex: 1;">
            <div class="density-label"><span>تراکم شبکه</span><span id="density-value">۱۰۰٪</span></div>
            <input type="range" min="30" max="100" value="100" class="density-slider" id="density-slider">
        </div>
    </div>

    <div id="control-buttons">
        <button id="change-formation-btn" class="control-button">تغییر شکل</button>
        <button id="pause-play-btn" class="control-button">توقف انیمیشن</button>
        <button id="reset-camera-btn" class="control-button">بازنشانی دوربین</button>
    </div>

    <canvas id="neural-network-canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        // ... (تمامی کدهای جاوااسکریپت فایل اصلی شما اینجا قرار می‌گیرند)
        // تغییرات کوچک برای فارسی‌سازی در خروجی‌های متنی JS:
        // مثلاً تغییر نام دکمه توقف در صورت کلیک:
        // pausePlayBtn.querySelector('span').textContent = config.paused ? 'پخش' : 'توقف انیمیشن';
    </script>

</body>
</html>
